name: India Metal Gigs Bot

on:
  schedule:
    # Runs once daily at 9:00 AM IST (03:30 UTC)
    - cron: "30 3 * * *"
  workflow_dispatch: # Manual trigger button in GitHub UI

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scraper.py

      - name: Commit updated posted_events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_events.json
          git diff --staged --quiet || git commit -m "bot: update posted events [skip ci]"
          git push
